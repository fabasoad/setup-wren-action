---
name: Functional Tests

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/functional-tests.yml
      - src/**
      - action.yml
  schedule:
    # Every Friday at 09:00 JST
    - cron: "0 0 * * 5"
  workflow_dispatch: {}

defaults:
  run:
    shell: sh

jobs:
  get-versions:
    name: Get 3 latest versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    outputs:
      versions: ${{ steps.prepare-list.outputs.versions }}
    steps:
      - name: Get releases
        id: github-releases
        uses: yakubique/github-releases@2827d6f627dc289b8cbbc9b4d030956d67c37c68 # v1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository: "wren-lang/wren-cli"
          sort: "desc"
      - name: Prepare list
        id: prepare-list
        env:
          RELEASES_AMOUNT: "3"
          RELEASES: "${{ steps.github-releases.outputs.releases }}"
        run: |
          versions=$(echo "${RELEASES}" \
            | jq -c -r --arg n "${RELEASES_AMOUNT}" '.[0:($n | tonumber)] | . += ["latest"]')
          echo "versions=${versions}" >> "$GITHUB_OUTPUT"
  run-script:
    name: Run script
    needs: [get-versions]
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu", "macos", "windows"]
        version: ${{ fromJSON(needs.get-versions.outputs.versions) }}
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "false"
      - name: Install wren
        uses: ./
        with:
          version: ${{ matrix.version }}
      - name: Validate command
        run: |
          [ "$(wren_cli ./hello-world.wren)" = "Hello World!" ] || exit 1
  test-force:
    name: Test force
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        force: ["true", "false"]
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "false"
      - name: Setup Wren 1
        id: setup-wren-1
        uses: ./
      - name: Setup Wren 2
        id: setup-wren-2
        uses: ./
        with:
          force: ${{ matrix.force }}
      - name: Test action completion
        env:
          SETUP_WREN_1_OUTPUT_INSTALLED: "${{ steps.setup-wren-1.outputs.installed }}"
          SETUP_WREN_2_OUTPUT_INSTALLED: "${{ steps.setup-wren-2.outputs.installed }}"
        run: |
          test_equal() {
            if [ "${2}" != "${3}" ]; then
              echo "::error title=${1}::Expected: ${3}. Actual: ${2}."
              exit 1
            fi
          }
          test_equal "Wrong \"installed\" output from setup-wren-1" \
            "${SETUP_WREN_1_OUTPUT_INSTALLED}" \
            "true"
          test_equal "Wrong \"installed\" output from setup-wren-2" \
            "${SETUP_WREN_2_OUTPUT_INSTALLED}" \
            "${{ matrix.force }}"
