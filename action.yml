---
name: "Setup Wren CLI"
author: Yevhen Fabizhevskyi
description: "This action sets up a wren CLI to run wren scripts."
branding:
  icon: terminal
  color: gray-dark
inputs:
  version:
    description: wren CLI version. Defaults to the latest version.
    required: false
    default: "latest"
  force:
    description: |
      If "false" skips installation if wren CLI is already installed. If "true"
      installs wren CLI in any case. Defaults to "false".
    required: false
    default: "false"
  github-token:
    description: |
      GitHub token that is used to send requests to GitHub API such as getting
      latest release. Defaults to the token provided by GitHub Actions environment.
    required: false
    default: ${{ github.token }}
outputs:
  installed:
    description: Whether wren CLI was installed or not.
    value: "${{ steps.install-wren-cli.outcome == 'success' }}"
runs:
  using: "composite"
  steps:
    - name: Collect info
      id: info
      env:
        INPUT_FORCE: "${{ inputs.force }}"
      run: ./collect-info.sh "${INPUT_FORCE}"
      shell: sh
      working-directory: "${{ github.action_path }}/src"

    - name: Download binary
      if: ${{ steps.info.outputs.bin-installed == 'false' }}
      id: download-binary
      uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
      with:
        repository: "wren-lang/wren-cli"
        latest: "${{ inputs.version == 'latest' }}"
        tag: "${{ case(inputs.version == 'latest', '', inputs.version) }}"
        fileName: "wren*cli-${{ case(runner.os == 'Linux', 'linux', runner.os == 'macOS', 'mac', 'windows') }}-*.zip"
        extract: "true"
        out-file-path: "${{ steps.info.outputs.bin-dir }}"
        token: "${{ inputs.github-token }}"

    - name: Install wren CLI
      if: ${{ steps.info.outputs.bin-installed == 'false' }}
      id: install-wren-cli
      env:
        STEP_DOWNLOAD_BINARY_OUTPUT_TAG_NAME: "${{ steps.download-binary.outputs.tag_name }}"
        STEP_INFO_OUTPUT_BIN_PATH: "${{ steps.info.outputs.bin-path }}"
      run: |
        sep="${{ case(steps.download-binary.outputs.tag_name == '0.3.0', '_', '-') }}"
        subdir="/wren${sep}cli-${{ case(runner.os == 'Linux', 'linux', runner.os == 'macOS', 'mac', 'windows') }}-${STEP_DOWNLOAD_BINARY_OUTPUT_TAG_NAME}"
        if [ "${STEP_DOWNLOAD_BINARY_OUTPUT_TAG_NAME}" = "0.3.0" ] && [ "${RUNNER_OS}" != "Linux" ]; then
          subdir=""
        fi
        bin_path="${STEP_INFO_OUTPUT_BIN_PATH}${subdir}"
        if [ "${RUNNER_OS}" = "Windows" ]; then
          if [ "${STEP_DOWNLOAD_BINARY_OUTPUT_TAG_NAME}" = "0.3.0" ]; then
            mv "${bin_path}/wren_cli-0.3.0.exe" "${bin_path}/wren_cli.exe"
          fi
        else
          chmod +x "${bin_path}/wren_cli"
        fi
        echo "${bin_path}" >> "$GITHUB_PATH"
      shell: sh

    - name: Print version
      run: wren_cli --version
      shell: sh
